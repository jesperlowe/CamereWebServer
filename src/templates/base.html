<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Camera Uploader{% endblock %} — Camera Uploader</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% block nav %}
<nav>
  <a href="/" class="nav-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    Camera Uploader
  </a>
  <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Dashboard</a>
  <a href="/camera" {% if request.url.path == '/camera' %}class="active"{% endif %}>Kamera</a>
  <a href="/upload" {% if request.url.path == '/upload' %}class="active"{% endif %}>Upload</a>
  <a href="/logs" {% if request.url.path == '/logs' %}class="active"{% endif %}>Logs</a>
</nav>
{% endblock %}

<div class="page">
  {% block content %}{% endblock %}
</div>

</body>
</html>
